<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Migration Streaks — Gemeny Heritage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--cream:#f7f4ef;--dark:#1e1810;--gold:#b8860b;--gold-hover:#d4a017;--navy:#0f1a2e;--serif:'Cormorant Garamond','Georgia',serif;--sans:'Inter',-apple-system,'Segoe UI',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--navy);color:var(--cream);overflow:hidden;height:100vh}

    .nav{background:rgba(15,26,46,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06);z-index:100;position:relative}
    .nav-inner{max-width:1400px;margin:0 auto;padding:0.7rem 2rem;display:flex;align-items:center;justify-content:space-between}
    .nav-brand{font-family:var(--serif);font-size:1.35rem;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--cream);text-decoration:none}
    .nav-links{display:flex;gap:1.5rem;list-style:none}
    .nav-links a{font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.4);text-decoration:none}
    .nav-links a:hover,.nav-links a.active{color:var(--gold)}
    .nav-menu-btn{display:none;background:none;border:none;color:rgba(255,255,255,0.5);font-size:1.3rem;cursor:pointer}
    .nav-dropdown{display:none;background:rgba(15,26,46,0.98);border-bottom:1px solid rgba(255,255,255,0.06);padding:0.5rem 2rem}
    .nav-dropdown.open{display:block}
    .nav-dropdown a{display:block;padding:0.5rem 0;font-size:0.8rem;text-transform:uppercase;color:rgba(255,255,255,0.5);text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.04)}
    .nav-dropdown a:last-child{border-bottom:none}
    .nav-dropdown a:hover,.nav-dropdown a.active{color:var(--gold)}

    .controls{display:flex;align-items:center;justify-content:center;gap:1rem;padding:0.6rem 2rem;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06);flex-wrap:wrap}
    .play-btn{width:40px;height:40px;border-radius:50%;background:rgba(212,160,23,0.12);border:2px solid rgba(212,160,23,0.4);color:#d4a017;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;transition:all 0.15s}
    .play-btn:hover{background:rgba(212,160,23,0.2);border-color:#d4a017}
    .play-btn.playing{background:rgba(212,160,23,0.25)}
    .year-display{font-family:var(--serif);font-size:2rem;font-weight:300;color:var(--gold);min-width:4rem;text-align:center}
    .speed-btn{padding:0.2rem 0.5rem;background:none;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.35);cursor:pointer;font-family:var(--sans);font-size:0.68rem;transition:all 0.15s}
    .speed-btn.active{border-color:#d4a017;color:#d4a017}
    .streak-count{font-size:0.7rem;color:rgba(255,255,255,0.3)}
    .slider{flex:1;max-width:300px;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.1);outline:none;border-radius:2px;cursor:pointer}
    .slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid rgba(15,26,46,0.8)}

    .main{position:relative;flex:1;height:calc(100vh - 110px)}
    canvas{display:block;width:100%;height:100%}

    .legend{position:absolute;bottom:1rem;left:1rem;font-size:0.7rem;color:rgba(255,255,255,0.3);z-index:10}
    .legend-item{display:flex;align-items:center;gap:0.4rem;margin-bottom:0.2rem}
    .legend-dot{width:8px;height:8px;border-radius:50%}

    .tooltip{position:fixed;background:rgba(15,26,46,0.95);border-left:3px solid var(--gold);padding:0.5rem 0.8rem;pointer-events:none;opacity:0;z-index:150;font-size:0.8rem;max-width:250px}
    .tooltip.visible{opacity:1}

    .credit{position:absolute;bottom:0;left:0;right:0;background:rgba(15,26,46,0.85);border-top:1px solid rgba(212,160,23,0.15);padding:0.4rem 2rem;text-align:center;z-index:10}
    .credit-line{font-family:var(--serif);font-size:0.8rem;color:rgba(255,255,255,0.8)}
    .credit-line strong{color:var(--gold)}
    .credit-sub{font-size:0.65rem;color:rgba(255,255,255,0.4);margin-top:0.1rem}

    .page{display:flex;flex-direction:column;height:100vh}

    @media(max-width:768px){
      .nav-links{display:none}
      .nav-menu-btn{display:block}
      .controls{gap:0.5rem;padding:0.4rem 0.8rem}
      .year-display{font-size:1.4rem}
    }
  </style>
</head>

<div class="page">

  <div class="controls">

  <div class="main">
    <canvas id="canvas"></canvas>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#d4a017"></div> Gemeny</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5e9acf"></div> Gordon/DuBois</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c47a5e"></div> Sanderson</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8e6aad"></div> Burgess</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9a8d7c"></div> Other</div>

    <div class="tooltip" id="tooltip"></div>
    <div class="credit">
      <div class="credit-line">Genealogical research by <strong>Steven E. Gemeny</strong></div>
      <div class="credit-sub">Website by Colin Gload</div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ── Geocoding lookup (approximate lat/lng for common places) ──
  const GEO = {
    // England
    'kent':{'lat':51.27,'lng':0.52},'warwickshire':{'lat':52.28,'lng':-1.58},'suffolk':{'lat':52.19,'lng':1.0},'somerset':{'lat':51.1,'lng':-2.9},'london':{'lat':51.51,'lng':-0.13},'leicestershire':{'lat':52.63,'lng':-1.13},'ashby':{'lat':52.75,'lng':-1.47},'ilchester':{'lat':51.0,'lng':-2.68},'hatton':{'lat':52.29,'lng':-1.67},'sussex':{'lat':50.83,'lng':-0.13},
    // Europe
    'lille':{'lat':50.63,'lng':3.06},'dublin':{'lat':53.35,'lng':-6.26},'waldenburg':{'lat':47.38,'lng':7.62},'new paltz':{'lat':41.75,'lng':-74.09},'ulster':{'lat':41.88,'lng':-74.03},
    // Colonial America
    'salem':{'lat':42.52,'lng':-70.9},'boston':{'lat':42.36,'lng':-71.06},'philadelphia':{'lat':39.95,'lng':-75.17},'new york':{'lat':40.71,'lng':-74.01},
    // Mid-Atlantic
    'baltimore':{'lat':39.29,'lng':-76.61},'maryland':{'lat':39.05,'lng':-76.64},'washington':{'lat':38.9,'lng':-77.04},'district of columbia':{'lat':38.9,'lng':-77.04},'d.c.':{'lat':38.9,'lng':-77.04},'dc':{'lat':38.9,'lng':-77.04},'alexandria':{'lat':38.8,'lng':-77.05},'virginia':{'lat':37.54,'lng':-77.44},'kinsale':{'lat':38.04,'lng':-76.58},'charles':{'lat':38.47,'lng':-77.01},'westmoreland':{'lat':38.11,'lng':-76.79},'fauquier':{'lat':38.72,'lng':-77.81},'fairfax':{'lat':38.85,'lng':-77.31},'prince george':{'lat':38.83,'lng':-76.85},'talbot':{'lat':38.75,'lng':-76.18},'calvert':{'lat':38.53,'lng':-76.53},'royal oak':{'lat':38.73,'lng':-76.18},'st. michaels':{'lat':38.79,'lng':-76.22},'st michaels':{'lat':38.79,'lng':-76.22},'solomons':{'lat':38.33,'lng':-76.45},'fallston':{'lat':39.52,'lng':-76.41},'bristol':{'lat':36.6,'lng':-82.19},
    // Carolinas & South
    'north carolina':{'lat':35.76,'lng':-79.02},'duplin':{'lat':34.94,'lng':-77.93},'surry':{'lat':36.39,'lng':-80.69},'guilford':{'lat':36.08,'lng':-79.82},'baxley':{'lat':31.78,'lng':-82.35},'georgia':{'lat':32.17,'lng':-82.9},'south carolina':{'lat':34.0,'lng':-81.03},
    // Northeast
    'massachusetts':{'lat':42.41,'lng':-71.38},'new hampshire':{'lat':43.19,'lng':-71.57},'connecticut':{'lat':41.6,'lng':-72.69},'new jersey':{'lat':40.06,'lng':-74.41},'pennsylvania':{'lat':40.27,'lng':-76.88},'perry':{'lat':40.4,'lng':-77.27},'cumberland':{'lat':40.16,'lng':-77.26},'berks':{'lat':40.42,'lng':-75.93},'lancaster':{'lat':40.04,'lng':-76.31},'poughkeepsie':{'lat':41.7,'lng':-73.93},'dutchess':{'lat':41.74,'lng':-73.74},'fishkill':{'lat':41.54,'lng':-73.9},
    // Midwest & West
    'indiana':{'lat':39.77,'lng':-86.16},'kansas':{'lat':39.01,'lng':-96.84},'junction city':{'lat':39.03,'lng':-96.83},'missouri':{'lat':38.58,'lng':-92.17},'ohio':{'lat':40.42,'lng':-82.91},'rapid city':{'lat':44.08,'lng':-103.23},'south dakota':{'lat':44.08,'lng':-103.23},
    // Catch-alls
    'united states':{'lat':39.5,'lng':-98.35},'usa':{'lat':39.5,'lng':-98.35}
  };

  function geocode(place) {
    if (!place) return null;
    const lc = place.toLowerCase();
    // Try each part from most specific to least
    const parts = lc.split(',').map(s => s.trim());
    for (const part of parts) {
      for (const [key, coords] of Object.entries(GEO)) {
        if (part.includes(key)) return coords;
      }
    }
    // Try full string
    for (const [key, coords] of Object.entries(GEO)) {
      if (lc.includes(key)) return coords;
    }
    return null;
  }

  // ── Map projection (Mercator, fit to canvas) ──
  function latLngToXY(lat, lng, w, h) {
    // World bounds focused on Atlantic region: lat 25-55, lng -110 to 10
    const minLat=25, maxLat=56, minLng=-110, maxLng=10;
    const x = ((lng - minLng) / (maxLng - minLng)) * w;
    const latRad = lat * Math.PI / 180;
    const mercN = Math.log(Math.tan(Math.PI/4 + latRad/2));
    const minMerc = Math.log(Math.tan(Math.PI/4 + (minLat*Math.PI/180)/2));
    const maxMerc = Math.log(Math.tan(Math.PI/4 + (maxLat*Math.PI/180)/2));
    const y = h - ((mercN - minMerc) / (maxMerc - minMerc)) * h;
    return {x, y};
  }

  function branchColor(branch) {
    if (!branch) return '#9a8d7c';
    if (branch.includes('gemeny')) return '#d4a017';
    if (branch.includes('gordon') || branch.includes('dubois')) return '#5e9acf';
    if (branch.includes('sanderson')) return '#c47a5e';
    if (branch.includes('burgess')) return '#8e6aad';
    return '#9a8d7c';
  }

  // ── State ──
  let data = null, nodeMap = {}, familyMap = {};
  let streaks = []; // {fromXY, toXY, year, name, color, parentName}
  let dots = [];    // {xy, year, name, color, place}
  let currentYear = 1500;
  let playing = false, timer = null, speed = 2;

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H, dpr;

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    dpr = window.devicePixelRatio || 1;
    W = rect.width; H = rect.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  // ── Build streaks from data ──
  function buildStreaks() {
    streaks = [];
    dots = [];

    for (const n of data.nodes) {
      const geo = geocode(n.birthPlace);
      if (!geo) continue;
      const xy = latLngToXY(geo.lat, geo.lng, W, H);
      const year = n.birthYear || 1700;
      const color = branchColor(n.branch);

      // Dot for this person's birthplace
      dots.push({ xy, year, name: n.name, color, place: n.birthPlace });

      // Streak from parent's birthplace to this person's birthplace
      if (n.familyAsChild && familyMap[n.familyAsChild]) {
        const fam = familyMap[n.familyAsChild];
        const parent = nodeMap[fam.husband] || nodeMap[fam.wife];
        if (parent && parent.birthPlace) {
          const parentGeo = geocode(parent.birthPlace);
          if (parentGeo) {
            const fromXY = latLngToXY(parentGeo.lat, parentGeo.lng, W, H);
            // Only add if there's actual distance
            const dist = Math.sqrt((fromXY.x-xy.x)**2 + (fromXY.y-xy.y)**2);
            if (dist > 5) {
              streaks.push({
                fromXY, toXY: xy, year, name: n.name, color,
                parentName: parent.name, dist
              });
            }
          }
        }
      }
    }

    streaks.sort((a, b) => a.year - b.year);
    dots.sort((a, b) => a.year - b.year);
  }

  // ── Drawing ──
  function draw() {
    ctx.fillStyle = '#0a1220';
    ctx.fillRect(0, 0, W, H);

    drawCoastline();
    drawStreaksAndDots();

    document.getElementById('yearDisplay').textContent = currentYear;
    document.getElementById('slider').value = currentYear;

    const activeStreaks = streaks.filter(s => s.year <= currentYear).length;
    const activeDots = dots.filter(d => d.year <= currentYear).length;
    document.getElementById('streakCount').textContent = activeDots + ' people · ' + activeStreaks + ' migrations';
  }

  function drawCoastline() {
    // Simplified coastline outlines
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;

    // North America rough outline
    const coast = [
      [49,-67],[47,-70],[43,-70],[42,-71],[41,-72],[40,-74],[39,-75],[38,-76],[37,-76],
      [36,-76],[35,-76],[33,-79],[31,-81],[30,-82],[28,-80],[25,-80],[25,-82],[27,-83],
      [29,-85],[30,-88],[29,-90],[30,-93],[28,-97],[26,-97],[32,-107],[35,-106],[37,-109],
      [40,-109],[42,-110],[45,-110],[49,-110],[49,-95],[49,-85],[49,-80],[47,-75]
    ];
    ctx.beginPath();
    coast.forEach(([lat,lng],i) => {
      const {x,y} = latLngToXY(lat,lng,W,H);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();

    // UK/Ireland rough
    const uk = [[50,-5],[51,1],[53,0],[55,-2],[58,-3],[57,-6],[55,-6],[52,-5],[50,-5]];
    ctx.beginPath();
    uk.forEach(([lat,lng],i) => {
      const {x,y} = latLngToXY(lat,lng,W,H);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();

    // France
    const fr = [[43,-1],[43,3],[46,2],[48,1],[49,2],[51,2],[49,-1],[48,-4],[47,-3],[43,-1]];
    ctx.beginPath();
    fr.forEach(([lat,lng],i) => {
      const {x,y} = latLngToXY(lat,lng,W,H);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();
  }

  function drawStreaksAndDots() {
    // Draw faded trails for all past streaks
    for (const s of streaks) {
      if (s.year > currentYear) continue;
      const age = currentYear - s.year;
      const alpha = Math.max(0.03, 0.4 - age * 0.003);

      // Curved streak line
      ctx.beginPath();
      ctx.strokeStyle = s.color.replace(')', ',' + alpha + ')').replace('rgb', 'rgba');
      if (!s.color.startsWith('rgba')) {
        ctx.strokeStyle = hexToRGBA(s.color, alpha);
      }
      ctx.lineWidth = Math.max(0.5, 2 - age * 0.01);

      const cx = (s.fromXY.x + s.toXY.x) / 2;
      const cy = (s.fromXY.y + s.toXY.y) / 2 - s.dist * 0.3;
      ctx.moveTo(s.fromXY.x, s.fromXY.y);
      ctx.quadraticCurveTo(cx, cy, s.toXY.x, s.toXY.y);
      ctx.stroke();

      // Animated head if recent
      if (age < 5) {
        const t = Math.min(1, (currentYear - s.year + 1) / 3);
        const hx = (1-t)*(1-t)*s.fromXY.x + 2*(1-t)*t*cx + t*t*s.toXY.x;
        const hy = (1-t)*(1-t)*s.fromXY.y + 2*(1-t)*t*cy + t*t*s.toXY.y;
        ctx.beginPath();
        ctx.arc(hx, hy, 3, 0, Math.PI*2);
        ctx.fillStyle = hexToRGBA(s.color, 0.9);
        ctx.fill();
      }
    }

    // Draw dots for birthplaces
    for (const d of dots) {
      if (d.year > currentYear) continue;
      const age = currentYear - d.year;
      const alpha = Math.max(0.05, 0.6 - age * 0.004);
      const r = age < 3 ? 3 : Math.max(1, 2 - age * 0.005);

      ctx.beginPath();
      ctx.arc(d.xy.x, d.xy.y, r, 0, Math.PI * 2);
      ctx.fillStyle = hexToRGBA(d.color, alpha);
      ctx.fill();

      // Glow for recent
      if (age < 3) {
        ctx.beginPath();
        ctx.arc(d.xy.x, d.xy.y, 6, 0, Math.PI * 2);
        ctx.fillStyle = hexToRGBA(d.color, 0.15);
        ctx.fill();
      }
    }
  }

  function hexToRGBA(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return 'rgba('+r+','+g+','+b+','+alpha+')';
  }

  // ── Playback ──
  const playBtn = document.getElementById('playBtn');
  const slider = document.getElementById('slider');

  playBtn.addEventListener('click', function() {
    if (playing) { pause(); } else { play(); }
  });

  slider.addEventListener('input', function() {
    currentYear = parseInt(this.value);
    draw();
  });

  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      speed = parseInt(this.dataset.speed);
      if (playing) { clearInterval(timer); timer = setInterval(advance, 60); }
    });
  });

  function play() {
    playing = true;
    playBtn.innerHTML = '&#9646;&#9646;';
    playBtn.classList.add('playing');
    if (currentYear >= 2025) currentYear = 1500;
    timer = setInterval(advance, 60);
  }

  function pause() {
    playing = false;
    playBtn.innerHTML = '&#9654;';
    playBtn.classList.remove('playing');
    clearInterval(timer);
  }

  function advance() {
    currentYear += speed;
    if (currentYear > 2025) { currentYear = 2025; pause(); }
    draw();
  }

  // ── Hover tooltip ──
  canvas.addEventListener('mousemove', function(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    // Find nearest dot
    let nearest = null, minDist = 15;
    for (const d of dots) {
      if (d.year > currentYear) continue;
      const dist = Math.sqrt((d.xy.x - mx)**2 + (d.xy.y - my)**2);
      if (dist < minDist) { minDist = dist; nearest = d; }
    }

    const tooltip = document.getElementById('tooltip');
    if (nearest) {
      tooltip.innerHTML = '<strong>' + nearest.name + '</strong><br>' +
        '<span style="color:var(--gold)">' + nearest.year + '</span> · ' +
        '<span style="color:rgba(255,255,255,0.5)">' + nearest.place.split(',').slice(0,2).join(', ') + '</span>';
      tooltip.classList.add('visible');
      tooltip.style.left = Math.min(e.clientX + 15, W - 260) + 'px';
      tooltip.style.top = (e.clientY + 15) + 'px';
    } else {
      tooltip.classList.remove('visible');
    }
  });

  // ── Mobile nav ──
  document.getElementById('navMenuBtn').addEventListener('click', function() {
    document.getElementById('navDropdown').classList.toggle('open');
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.nav')) document.getElementById('navDropdown').classList.remove('open');
  });

  // ── Init ──
  async function init() {
    const paths = ['../data/gedcom-tree.json','../../data/gedcom-tree.json','/gemeny-heritage/data/gedcom-tree.json'];
    for (const p of paths) {
      try { const r = await fetch(p); if (r.ok) { data = await r.json(); break; } } catch(e) {}
    }
    if (!data) return;
    for (const n of data.nodes) nodeMap[n.id] = n;
    for (const f of data.families) familyMap[f.id] = f;
    resize();
    buildStreaks();
    draw();
  }

  window.addEventListener('resize', function() { resize(); if (data) { buildStreaks(); draw(); } });
  init();
})();
</script>
</body>
</html>
